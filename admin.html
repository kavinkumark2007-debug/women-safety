<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { font-family: Arial; }
    .card {
      border: 1px solid red;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>🚨 SOS Admin Dashboard</h1>

<div id="data"></div>

<script src="firebase.js"></script>

<script>
firebase.database().ref("SOS Alerts").on("value", function(snapshot){

let data = snapshot.val();
let output = "";

for(let id in data){

output += `
<div class="card">
<h3>Name: ${data[id].name}</h3>
<p>Time: ${data[id].time}</p>

<a target="_blank"
href="https://www.google.com/maps?q=${data[id].latitude},${data[id].longitude}">
View Location
</a>

</div>
`;

}

document.getElementById("data").innerHTML = output;

});
</script>

</body>
</html>
